name: PocketEngineer
options:
  bundleIdPrefix: com.pocketengineer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.10.0"

targets:
  PocketEngineer:
    type: application
    platform: iOS
    sources:
      - PocketEngineer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vaibhavdubey.pocketengineer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: AMRM9564A6
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "Pocket Engineer"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan QR code to connect to your dev server"
    dependencies:
      - package: Citadel

  PocketEngineerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PocketEngineerTests
    dependencies:
      - target: PocketEngineer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vaibhavdubey.pocketengineer.tests
        DEVELOPMENT_TEAM: AMRM9564A6
        GENERATE_INFOPLIST_FILE: true
